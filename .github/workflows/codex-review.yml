name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Inject OAuth Session
        run: |
          mkdir -p ~/.codex
          echo '${{ secrets.CODEX_AUTH_DOT_JSON }}' > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

      - name: Pre-fetch base and head refs for the PR
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Run Codex review
        run: |
          cat > /tmp/codex-prompt.txt << 'PROMPT'
          This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.

          Review ONLY the changes introduced by the PR:
            git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

          Focus on:
          - Bugs, regressions, edge cases
          - Security and safety issues
          - Performance pitfalls
          - Tests missing or incorrect
          - Cairo/Dojo and React/TypeScript best practices (as relevant)

          Be concise, specific, and cite file paths/line numbers when possible.

          Pull request title and body:
          ----
          ${{ github.event.pull_request.title }}
          ${{ github.event.pull_request.body }}
          PROMPT

          npx -y @openai/codex -q --approval-mode full-auto "$(cat /tmp/codex-prompt.txt)" > /tmp/review.txt 2>&1 || true
          cat /tmp/review.txt

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const reviewPath = '/tmp/review.txt';
            if (!fs.existsSync(reviewPath)) return;
            const review = fs.readFileSync(reviewPath, 'utf8').trim();
            if (!review) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: review,
            });
