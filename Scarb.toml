[workspace]
members = [
    "contracts/packages/interfaces",
    "contracts/packages/budokan",
]

[workspace.package]
version = "0.0.1"
edition = "2024_07"
cairo-version = "2.15.0"

[workspace.dependencies]
starknet = "2.15.0"
cairo_test = "2.15.0"
snforge_std = { git = "https://github.com/foundry-rs/starknet-foundry", tag = "v0.55.0" }
openzeppelin_access = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0" }
openzeppelin_introspection = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0" }
openzeppelin_token = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0" }
openzeppelin_interfaces = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0" }
openzeppelin_upgrades = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0" }
game_components_embeddable_game_standard = { path = "../game-components/packages/embeddable_game_standard" }
game_components_metagame = { path = "../game-components/packages/metagame" }
game_components_utilities = { path = "../game-components/packages/utilities" }
game_components_interfaces = { path = "../game-components/packages/interfaces" }
game_components_test_common = { path = "../game-components/packages/test_common" }
game_components_testing = { path = "../game-components/packages/testing" }

[scripts]
test = "snforge test"

[profile.dev.cairo]
unstable-add-statements-code-locations-debug-info = true
unstable-add-statements-functions-debug-info = true
inlining-strategy = "avoid"

[profile.dev]
[profile.slot]
[profile.sepolia]
[profile.mainnet]

[tool.snforge]
# Fork configurations for testing
[[tool.snforge.fork]]
name = "sepolia"
url = "https://starknet-sepolia.public.blastapi.io"
block_id.tag = "latest"

[[tool.snforge.fork]]
name = "mainnet"
url = "https://starknet-mainnet.public.blastapi.io"
block_id.tag = "latest"
